version: "3.8"

services:
  orchestrator:
    build: ./services/orchestrator
    container_name: orchestrator
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./services/orchestrator:/app
      - ./skills:/app/skills:ro
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agent123}
      POSTGRES_DB: solution_expert
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./services/orchestrator/app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d solution_expert"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    restart: unless-stopped

  web-chat:
    build: ./services/web-chat
    container_name: web-chat
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
    restart: unless-stopped

  worker:
    build: ./services/orchestrator
    container_name: worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file: .env
    volumes:
      - ./services/orchestrator:/app
      - ./skills:/app/skills:ro
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build: ./services/orchestrator
    container_name: scheduler
    command: python -c "from app.scheduler import start_scheduler; start_scheduler(); import time; time.sleep(999999)"
    env_file: .env
    volumes:
      - ./services/orchestrator:/app
      - ./skills:/app/skills:ro
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - orchestrator
      - web-chat
    restart: unless-stopped
